name: Build and Push Docker Image

on:
  push:
    branches:
      - dev

permissions:
  contents: read

jobs:
  build:
    runs-on: ${{ matrix.platform == 'amd64' && github.actor == 'slamanna212' && 'rapture-matchexec' || matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        platform: [amd64, arm64]
        include:
          - platform: amd64
            runner: ubuntu-latest
          - platform: arm64
            runner: ubuntu-24.04-arm
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Docker
      run: |
        if ! command -v docker &> /dev/null; then
          curl -fsSL https://get.docker.com | sudo sh
          sudo systemctl start docker
          sudo systemctl enable docker
        fi
        # Wait for docker socket to be ready
        timeout 30 bash -c 'until [ -S /var/run/docker.sock ]; do sleep 1; done'
        sudo chmod 666 /var/run/docker.sock

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GHCR_TOKEN }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v6
      with:
        context: .
        platforms: linux/${{ matrix.platform }}
        push: true
        tags: ghcr.io/${{ github.actor }}/matchexec:dev-${{ matrix.platform }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        
  merge:
    runs-on: ${{ github.actor == 'slamanna212' && 'rapture-matchexec' || 'ubuntu-latest' }}
    needs: build
    permissions:
      packages: write
    steps:
    - name: Set up Docker
      run: |
        if ! command -v docker &> /dev/null; then
          curl -fsSL https://get.docker.com | sudo sh
          sudo systemctl start docker
          sudo systemctl enable docker
        fi
        # Wait for docker socket to be ready
        timeout 30 bash -c 'until [ -S /var/run/docker.sock ]; do sleep 1; done'
        sudo chmod 666 /var/run/docker.sock

    - name: Log in to GitHub Container Registry
      run: |
        echo ${{ secrets.GHCR_TOKEN }} | docker login -u ${{ github.actor }} --password-stdin ghcr.io
        
    - name: Create and push manifest
      run: |
        docker buildx imagetools create -t ghcr.io/${{ github.actor }}/matchexec:dev \
          ghcr.io/${{ github.actor }}/matchexec:dev-amd64 \
          ghcr.io/${{ github.actor }}/matchexec:dev-arm64