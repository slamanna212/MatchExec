name: PR Checks

on:
  pull_request:
    branches: [main, dev]

permissions:
  contents: read

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ${{ contains(fromJSON('["slamanna212", "dependabot[bot]"]'), github.actor) && 'rapture-matchexec' || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run ESLint
        id: eslint
        run: npm run lint
        continue-on-error: true
      - name: Run TypeScript check
        id: typecheck
        run: npm run typecheck
        continue-on-error: true
      - name: Write job summary
        if: always()
        run: |
          echo "## Lint & Type Check" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.eslint.outcome }}" = "success" ]; then
            echo "- ✅ ESLint" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ❌ ESLint failed" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${{ steps.typecheck.outcome }}" = "success" ]; then
            echo "- ✅ TypeScript" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ❌ TypeScript failed" >> $GITHUB_STEP_SUMMARY
          fi
      - name: Fail if errors
        if: steps.eslint.outcome == 'failure' || steps.typecheck.outcome == 'failure'
        run: exit 1

  test:
    name: Unit Tests
    runs-on: ${{ contains(fromJSON('["slamanna212", "dependabot[bot]"]'), github.actor) && 'rapture-matchexec' || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run unit tests with coverage
        run: npx vitest run --coverage --reporter=default --reporter=github-actions --reporter=junit --outputFile=test-results/unit.junit.xml
      - name: Upload coverage
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage/coverage-final.json
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: test-results/unit.junit.xml

  integration-test:
    name: Integration Tests
    runs-on: ${{ contains(fromJSON('["slamanna212", "dependabot[bot]"]'), github.actor) && 'rapture-matchexec' || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run integration tests
        run: npx vitest run tests/integration --reporter=default --reporter=github-actions --reporter=junit --outputFile=test-results/integration.junit.xml
      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: test-results/integration.junit.xml

  docker-test:
    name: Docker Integration Test
    runs-on: ${{ contains(fromJSON('["slamanna212", "dependabot[bot]"]'), github.actor) && 'rapture-matchexec' || 'ubuntu-latest' }}
    needs: [lint-and-typecheck]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build Docker image
        id: build
        run: |
          docker build -t matchexec:pr-test .
          echo "BUILD_STATUS=✅ Success" >> $GITHUB_ENV
        continue-on-error: true
      - name: Set build failure status
        if: steps.build.outcome == 'failure'
        run: echo "BUILD_STATUS=❌ Failed" >> $GITHUB_ENV
      - name: Run container
        id: start
        run: |
          docker run -d \
            --name matchexec-test \
            -p 3000:3000 \
            -e DISCORD_TOKEN=placeholder \
            matchexec:pr-test
          echo "START_STATUS=✅ Success" >> $GITHUB_ENV
        continue-on-error: true
      - name: Set start failure status
        if: steps.start.outcome == 'failure'
        run: echo "START_STATUS=❌ Failed" >> $GITHUB_ENV
      - name: Wait for app to be healthy
        id: health
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/api/health; then
              echo "App is up"
              echo "HEALTH_STATUS=✅ Healthy" >> $GITHUB_ENV
              exit 0
            fi
            sleep 3
          done
          echo "HEALTH_STATUS=❌ Timed out" >> $GITHUB_ENV
          exit 1
        continue-on-error: true
      - name: Capture container logs
        if: always()
        run: |
          docker logs matchexec-test > docker-output.log 2>&1 || true
          docker inspect matchexec-test --format '{{json .State}}' > container-state.json 2>/dev/null || echo '{}' > container-state.json
      - name: Upload logs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docker-test-logs
          path: |
            docker-output.log
            container-state.json
      - name: Write job summary
        if: always()
        run: |
          echo "## Docker Integration Test" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Image Build | ${BUILD_STATUS:-⚠️ Not run} |" >> $GITHUB_STEP_SUMMARY
          echo "| Container Start | ${START_STATUS:-⚠️ Not run} |" >> $GITHUB_STEP_SUMMARY
          echo "| Port 3000 Health Check | ${HEALTH_STATUS:-⚠️ Not run} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Container Logs (last 100 lines)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -100 docker-output.log >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "(no logs captured)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
      - name: Cleanup
        if: always()
        run: |
          docker stop matchexec-test || true
          docker rm matchexec-test || true
          docker rmi matchexec:pr-test || true
      - name: Fail if health check failed
        if: steps.health.outcome == 'failure' || steps.build.outcome == 'failure'
        run: exit 1

  helm-version-sync:
    name: Helm Version Sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check appVersion matches package.json version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          CHART_APP_VERSION=$(grep '^appVersion:' kubernetes/helm/matchexec/Chart.yaml | sed 's/appVersion: *"\?\([^"]*\)"\?/\1/')
          echo "package.json version:   $PKG_VERSION"
          echo "Chart.yaml appVersion:  $CHART_APP_VERSION"
          echo "## Helm Version Sync" >> $GITHUB_STEP_SUMMARY
          echo "| File | Version |" >> $GITHUB_STEP_SUMMARY
          echo "|------|---------|" >> $GITHUB_STEP_SUMMARY
          echo "| package.json | \`$PKG_VERSION\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Chart.yaml appVersion | \`$CHART_APP_VERSION\` |" >> $GITHUB_STEP_SUMMARY
          if [ "$PKG_VERSION" != "$CHART_APP_VERSION" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "❌ Version mismatch — update \`appVersion\` in \`kubernetes/helm/matchexec/Chart.yaml\` to match \`package.json\`" >> $GITHUB_STEP_SUMMARY
            echo "Error: appVersion \"$CHART_APP_VERSION\" in Chart.yaml does not match version \"$PKG_VERSION\" in package.json"
            exit 1
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Versions match" >> $GITHUB_STEP_SUMMARY

  build:
    name: Build
    runs-on: ${{ contains(fromJSON('["slamanna212", "dependabot[bot]"]'), github.actor) && 'rapture-matchexec' || 'ubuntu-latest' }}
    needs: [lint-and-typecheck, test, integration-test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build Next.js application
        id: build
        run: npm run build
        continue-on-error: true
      - name: Write job summary
        if: always()
        run: |
          echo "## Build" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.build.outcome }}" = "success" ]; then
            echo "✅ Next.js build succeeded" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Next.js build failed" >> $GITHUB_STEP_SUMMARY
          fi
      - name: Fail if build failed
        if: steps.build.outcome == 'failure'
        run: exit 1
