{{- if .Values.metrics.grafana.dashboardConfigMap -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "matchexec.fullname" . }}-grafana-dashboard
  labels:
    {{- include "matchexec.labels" . | nindent 4 }}
    {{- with .Values.metrics.grafana.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
data:
  matchexec-dashboard.json: |-
    {{- .Files.Get "dashboards/matchexec-dashboard.json" | nindent 4 }}
{{- end }}
